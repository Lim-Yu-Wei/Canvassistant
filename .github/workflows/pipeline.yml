name: Daily Canvas Pipeline
on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:      # Allows manual trigger
concurrency:
  group: canvas-pipeline
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Pipeline
      env:
        CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
        CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python scripts/maintenance_sync.py
    - name: Push Obsidian Notes to Vault Repo
      env:
        VAULT_TOKEN: ${{ secrets.VAULT_PAT }}
      run: |
        git clone https://x-access-token:${VAULT_TOKEN}@github.com/Ciltan/sem2-2526-vault.git /tmp/vault-repo
        cp -r vault/. /tmp/vault-repo/
        cd /tmp/vault-repo
        git config user.name "Canvas Pipeline Bot"
        git config user.email "bot@canvassistant"
        git add .
        if git diff --staged --quiet; then
          echo "No new notes to commit."
        else
          git commit -m "notes: update from pipeline run"
          git push
        fi
